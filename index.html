<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait Video Reveal with Sound</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow: hidden; font-family: sans-serif; }

        .main-container {
            position: relative; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000;
        }

        /* Video Portrait */
        .video-wrapper {
            position: relative; height: 100vh; aspect-ratio: 9/16;
            width: auto; opacity: 0; transform: scale(1.1);
            transition: all 2s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Tirai Reveal */
        .curtain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; pointer-events: none;
        }

        .curtain-side {
            flex: 1; background: #0d0d0d;
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        /* Tombol Sound Floating */
        #soundToggle {
            position: absolute; bottom: 30px; right: 30px;
            z-index: 20; background: rgba(255,255,255,0.2);
            border: none; border-radius: 50%; width: 50px; height: 50px;
            cursor: pointer; display: none; /* Muncul setelah loading */
            align-items: center; justify-content: center;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        #soundToggle:hover { background: rgba(255,255,255,0.4); }
        #soundToggle svg { fill: white; width: 24px; height: 24px; }

        /* Overlay Awal */
        .overlay {
            position: absolute; z-index: 11; color: white;
            text-align: center; cursor: pointer; width: 100%;
        }
        .overlay h1 { font-size: 1rem; letter-spacing: 10px; font-weight: 300; }

        /* Animasi Aktif */
        .is-loaded .left-side { transform: translateX(-100%); }
        .is-loaded .right-side { transform: translateX(100%); }
        .is-loaded .video-wrapper { opacity: 1; transform: scale(1); }
        .is-loaded .overlay { opacity: 0; visibility: hidden; }

        @media (max-width: 768px) {
            .video-wrapper { width: 100vw; height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="main-container" id="app">
        <!-- Tirai -->
        <div class="curtain">
            <div class="curtain-side left-side"></div>
            <div class="curtain-side right-side"></div>
        </div>

        <!-- Tombol Sound -->
        <button id="soundToggle" onclick="toggleMute()">
            <svg id="speakerIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>

        <!-- Layar Klik Awal -->
        <div class="overlay" id="startBtn">
            <h1>TAP TO UNMUTE & ENTER</h1>
        </div>

        <!-- Video -->
        <div class="video-wrapper">
            <video id="myVideo" playsinline loop preload="auto">
                <source src="https://www.dropbox.com/scl/fi/jlxvc07bs0vjpq0srk5a4/MOGM.mov?rlkey=9d7ev9ht0mjl3nvpqtddeh1n4&st=j1men78j&dl=1" type="video/quicktime">
                <source src="https://www.dropbox.com/scl/fi/jlxvc07bs0vjpq0srk5a4/MOGM.mov?rlkey=9d7ev9ht0mjl3nvpqtddeh1n4&raw=1" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const app = document.getElementById('app');
        const startBtn = document.getElementById('startBtn');
        const soundBtn = document.getElementById('soundToggle');
        const speakerIcon = document.getElementById('speakerIcon');

        // Ikon Speaker ON/OFF (SVG Path)
        const iconSoundOn = "M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z";
        const iconSoundOff = "M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z";

        // Fungsi Memulai Video dengan Suara
        function startExperience() {
            video.muted = false; // AKTIFKAN SUARA
            video.play().then(() => {
                app.classList.add('is-loaded');
                soundBtn.style.display = 'flex';
                updateIcon();
            }).catch(e => {
                // Jika masih diblokir, putar tanpa suara dulu
                video.muted = true;
                video.play();
                app.classList.add('is-loaded');
                soundBtn.style.display = 'flex';
                updateIcon();
            });
        }

        // Toggle Mute Manual
        function toggleMute() {
            video.muted = !video.muted;
            updateIcon();
        }

        function updateIcon() {
            const path = speakerIcon.querySelector('path');
            path.setAttribute('d', video.muted ? iconSoundOff : iconSoundOn);
        }

        // Listener Klik Pertama
        startBtn.addEventListener('click', startExperience);

        // Otomatis jalan (tapi biasanya muted)
        window.onload = () => {
            video.muted = true;
            video.play();
        };
    </script>
</body>
</html>
