<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Netflix Portrait Player</title>
    <style>
        :root { --n-red: #E50914; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Arial', sans-serif; color: #fff; }

        /* Container */
        .main-app {
            position: relative; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* Video Styling */
        .video-box {
            position: relative; height: 100vh; aspect-ratio: 9/16;
            background: #000; overflow: hidden; z-index: 5;
            opacity: 0; transform: scale(1.1);
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Curtain / Tirai */
        .curtain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; display: flex; pointer-events: none;
        }
        .curtain-panel { flex: 1; background: #000; transition: 1.5s ease-in-out; }

        /* Overlay Awal */
        .tap-overlay {
            position: absolute; z-index: 30; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.5); cursor: pointer;
        }
        .tap-overlay h1 { font-size: 1.2rem; letter-spacing: 10px; font-weight: 200; border: 1px solid #fff; padding: 20px; }

        /* Netflix Controls */
        .controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 30px 20px; z-index: 10; opacity: 0; transition: 0.4s;
        }
        .video-box:hover .controls { opacity: 1; }

        .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.3); cursor: pointer; border-radius: 2px; }
        .bar-fill { width: 0%; height: 100%; background: var(--n-red); border-radius: 2px; }

        .btns { display: flex; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 20px; align-items: center; }
        .btn { background: none; border: none; fill: #fff; cursor: pointer; width: 28px; }
        .next-btn { background: #fff; color: #000; padding: 8px 15px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; }

        /* Animasi Aktif */
        .active .left { transform: translateX(-100%); }
        .active .right { transform: translateX(100%); }
        .active .video-box { opacity: 1; transform: scale(1); }
        .active .tap-overlay { display: none; }

        @media (max-width: 768px) {
            .video-box { width: 100vw; height: 100vh; }
            .controls { opacity: 1; padding-bottom: 50px; }
        }
    </style>
</head>
<body>

    <div class="main-app" id="app">
        <div class="curtain">
            <div class="curtain-panel left"></div>
            <div class="curtain-panel right"></div>
        </div>

        <div class="tap-overlay" id="startTrigger">
            <h1>TAP TO WATCH</h1>
        </div>

        <div class="video-box" id="p">
            <video id="vid" playsinline preload="auto" muted></video>

            <div class="controls">
                <div class="progress-container">
                    <span id="t1" style="font-size:12px">0:00</span>
                    <div class="bar-bg" id="barBg"><div class="bar-fill" id="barFill"></div></div>
                    <span id="t2" style="font-size:12px">0:00</span>
                </div>
                <div class="btns">
                    <div class="btn-group">
                        <button class="btn" onclick="skip(-10)"><svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg></button>
                        <button class="btn" onclick="togglePlay()"><svg id="playIco" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                        <button class="btn" onclick="skip(10)"><svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></button>
                    </div>
                    <button class="next-btn" onclick="playNext()">NEXT VIDEO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DAFTAR VIDEO (Wajib Direct Link &raw=1 untuk Dropbox)
        const playlist = [
            "https://www.dropbox.com/scl/fi/jlxvc07bs0vjpq0srk5a4/MOGM.mov?rlkey=9d7ev9ht0mjl3nvpqtddeh1n4&raw=1",
            "https://www.dropbox.com/scl/fi/fxq0pyy4ka7or54zgn87i/OMGM2.mp4?rlkey=29jvysyv0ce3424vvotg8u9ix&st=gn49huca&raw=1"
        ];

        let index = 0;
        const vid = document.getElementById('vid');
        const app = document.getElementById('app');
        const playIco = document.getElementById('playIco');
        const barFill = document.getElementById('barFill');

        // Fungsi Load Video
        function loadVid(i) {
            if (i >= playlist.length) i = 0;
            index = i;
            
            vid.pause();
            vid.src = playlist[index]; // Menggunakan src langsung lebih stabil
            vid.load();
            
            // Mencoba play (Browser butuh muted=true di awal)
            vid.play().catch(e => console.log("Play diblokir, menunggu klik user."));
            updateIcon();
        }

        // Trigger Pertama (Reveal + Unmute)
        document.getElementById('startTrigger').onclick = () => {
            app.classList.add('active');
            vid.muted = false; // NYALAKAN SUARA SETELAH KLIK
            loadVid(0);
        };

        // Otomatis Lanjut
        vid.onended = () => playNext();

        function playNext() {
            index++;
            loadVid(index);
        }

        function togglePlay() {
            vid.paused ? vid.play() : vid.pause();
            updateIcon();
        }

        function updateIcon() {
            playIco.querySelector('path').setAttribute('d', vid.paused ? "M8 5v14l11-7z" : "M6 19h4V5H6v14zm8-14v14h4V5h-4z");
        }

        vid.ontimeupdate = () => {
            if (vid.duration) {
                const pct = (vid.currentTime / vid.duration) * 100;
                barFill.style.width = pct + "%";
                document.getElementById('t1').innerText = fmtTime(vid.currentTime);
                document.getElementById('t2').innerText = fmtTime(vid.duration);
            }
        };

        document.getElementById('barBg').onclick = (e) => {
            const pct = e.offsetX / e.target.offsetWidth;
            vid.currentTime = pct * vid.duration;
        };

        function skip(v) { vid.currentTime += v; }
        function fmtTime(t) {
            let m = Math.floor(t / 60), s = Math.floor(t % 60);
            return m + ":" + (s < 10 ? '0' : '') + s;
        }

        // Emergency Fix: Jika video error/tidak load
        vid.onerror = () => {
            console.error("Video gagal dimuat, mencoba format berikutnya...");
            playNext();
        };
    </script>
</body>
</html>
