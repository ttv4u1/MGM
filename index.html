<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Portrait Player - Drag & Reveal</title>
    <style>
        /* Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }

        .main-wrapper {
            position: relative; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* Container Video Portrait */
        .player-card {
            position: relative; height: 90vh; aspect-ratio: 9/16;
            background: #111; border-radius: 16px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            opacity: 0; transform: scale(0.9);
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 5;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlay Tirai */
        .curtain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; pointer-events: none;
        }
        .curtain-side { flex: 1; background: #0a0a0a; transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1); }

        /* Start Overlay */
        .start-overlay {
            position: absolute; z-index: 11; width: 100%; text-align: center;
            cursor: pointer; transition: 0.5s;
        }
        .start-overlay h1 { font-size: 1.2rem; letter-spacing: 10px; font-weight: 200; }

        /* Custom UI Controls */
        .ui-controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px; opacity: 0; transition: 0.4s; z-index: 6;
        }
        .player-card:hover .ui-controls { opacity: 1; }

        /* Progress Bar / Slider */
        .seek-container {
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
        }
        #seekSlider {
            flex: 1; cursor: pointer; accent-color: #ff0000; height: 5px;
        }
        .time-label { font-size: 12px; font-family: monospace; min-width: 35px; }

        /* Buttons Row */
        .btn-group { display: flex; justify-content: space-around; align-items: center; }
        .btn {
            background: none; border: none; fill: white; cursor: pointer;
            padding: 8px; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.2); fill: #ff0000; }
        .btn svg { width: 22px; height: 22px; }

        /* States */
        .is-loaded .left-side { transform: translateX(-100%); }
        .is-loaded .right-side { transform: translateX(100%); }
        .is-loaded .player-card { opacity: 1; transform: scale(1); }
        .is-loaded .start-overlay { opacity: 0; visibility: hidden; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .player-card { height: 100vh; width: 100vw; border-radius: 0; }
            .ui-controls { opacity: 1; padding-bottom: 50px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="mainApp">
        <!-- Reveal Curtain -->
        <div class="curtain">
            <div class="curtain-side left-side"></div>
            <div class="curtain-side right-side"></div>
        </div>

        <!-- Start Trigger -->
        <div class="start-overlay" id="enterBtn">
            <h1>TAP TO ENTER</h1>
        </div>

        <!-- Player Container -->
        <div class="player-card" id="videoContainer">
            <video id="v" playsinline loop>
                <source src="https://www.dropbox.com/scl/fi/jlxvc07bs0vjpq0srk5a4/MOGM.mov?rlkey=9d7ev9ht0mjl3nvpqtddeh1n4&raw=1" type="video/mp4">
            </video>

            <!-- Custom Controls -->
            <div class="ui-controls">
                
                <!-- Drag Seeker -->
                <div class="seek-container">
                    <span class="time-label" id="curTime">00:00</span>
                    <input type="range" id="seekSlider" value="0" min="0" step="0.1">
                    <span class="time-label" id="durTime">00:00</span>
                </div>

                <div class="btn-group">
                    <!-- Stop -->
                    <button class="btn" onclick="stopVid()"><svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg></button>
                    
                    <!-- Fast Backward (Hold) -->
                    <button class="btn" onmousedown="startRev()" onmouseup="endRev()" ontouchstart="startRev()" ontouchend="endRev()">
                        <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                    </button>

                    <!-- Play / Pause -->
                    <button class="btn" onclick="toggleV()"><svg id="pIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>

                    <!-- Fast Forward (Hold) -->
                    <button class="btn" onmousedown="fwd()" onmouseup="nrm()" ontouchstart="fwd()" ontouchend="nrm()">
                        <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                    </button>

                    <!-- Fullscreen -->
                    <button class="btn" onclick="fullS()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('v');
        const app = document.getElementById('mainApp');
        const enterBtn = document.getElementById('enterBtn');
        const pIcon = document.getElementById('pIcon');
        const seek = document.getElementById('seekSlider');
        const curTxt = document.getElementById('curTime');
        const durTxt = document.getElementById('durTime');
        
        let revTask;

        // Init: Masuk ke halaman
        enterBtn.onclick = () => {
            app.classList.add('is-loaded');
            v.play();
            updatePlayBtn();
        };

        // Update Slider saat video jalan
        v.ontimeupdate = () => {
            if (!v.duration) return;
            const pct = (v.currentTime / v.duration) * 100;
            seek.value = v.currentTime;
            seek.max = v.duration;
            curTxt.innerText = fmtTime(v.currentTime);
            durTxt.innerText = fmtTime(v.duration);
        };

        // DRAG FUNCTIONALITY (Geser Slider)
        seek.oninput = () => {
            v.currentTime = seek.value;
        };

        // Play/Pause
        function toggleV() {
            v.paused ? v.play() : v.pause();
            updatePlayBtn();
        }

        function updatePlayBtn() {
            pIcon.querySelector('path').setAttribute('d', v.paused ? "M8 5v14l11-7z" : "M6 19h4V5H6v14zm8-14v14h4V5h-4z");
        }

        // Stop
        function stopVid() {
            v.pause(); v.currentTime = 0;
            updatePlayBtn();
        }

        // Fast Forward (Speed)
        function fwd() { v.playbackRate = 4.0; }
        function nrm() { v.playbackRate = 1.0; }

        // Reverse (Hold)
        function startRev() {
            v.pause();
            revTask = setInterval(() => {
                if(v.currentTime > 0.1) v.currentTime -= 0.1;
                else endRev();
            }, 40);
        }
        function endRev() { clearInterval(revTask); v.play(); }

        // Format Time (00:00)
        function fmtTime(s) {
            let m = Math.floor(s / 60);
            s = Math.floor(s % 60);
            return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
        }

        // Fullscreen
        function fullS() {
            const container = document.getElementById('videoContainer');
            if (!document.fullscreenElement) container.requestFullscreen();
            else document.exitFullscreen();
        }

        // Keyboard Space
        window.onkeydown = (e) => { if(e.code === "Space") toggleV(); };
    </script>
</body>
</html>
